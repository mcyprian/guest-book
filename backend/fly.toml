# fly.toml app configuration file generated for guest-book-api on 2026-04-18T06:56:01+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'guest-book-api'
primary_region = 'fra'
kill_signal = 'SIGTERM'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  CORS_ORIGINS = 'https://guest-book-web.fly.dev'
  GOOGLE_SERVICE_ACCOUNT_KEY_PATH = '/app/credentials/service-account.json'
  JWT_LIFETIME_SECONDS = '3600'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/api/health'

[[files]]
  guest_path = '/app/credentials/service-account.json'
  secret_name = 'GOOGLE_SERVICE_ACCOUNT_JSON'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
